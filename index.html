<style>
  :root{
    --bg:#04050c; --panel:#0c1220; --line:rgba(255,255,255,.08);
    --text:#e9edf6; --dim:#8b93a9; --faint:#565f75;
    --on:#2fe6a8; --off:#ff5d6c; --gold:#f2d27a;
    --font:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"Roboto Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1300px 800px at 50% -12%, #13214a 0%, transparent 52%),
      radial-gradient(1000px 700px at 100% 108%, #1a1235 0%, transparent 48%),
      radial-gradient(900px 600px at 0% 100%, #0a1e2a 0%, transparent 45%),
      var(--bg);
    color:var(--text); font-family:var(--font);
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:6}
  .brand{display:flex;align-items:center;gap:10px;margin-right:auto}
  .moon{width:26px;height:26px;filter:drop-shadow(0 0 8px rgba(242,210,122,.6))}
  .brand .t{font-weight:800;font-size:15.5px;letter-spacing:-.01em}
  .brand .s{font-size:10.5px;color:var(--faint);letter-spacing:.16em;font-weight:700;text-transform:uppercase}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--on)}
  .live .d{width:7px;height:7px;border-radius:50%;background:var(--on);box-shadow:0 0 10px var(--on);animation:blink 1.6s infinite}
  @keyframes blink{50%{opacity:.35}}
  .seg{display:flex;flex-wrap:wrap;gap:3px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:3px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--dim);font-family:inherit;
    font-weight:700;font-size:11.5px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:.15s;white-space:nowrap}
  .seg button:hover{color:var(--text)}
  .seg button[aria-pressed="true"]{background:linear-gradient(180deg,#1d2a47,#141d31);color:var(--text);box-shadow:0 0 0 1px rgba(255,255,255,.06) inset}
  .socials{display:flex;gap:7px;flex-wrap:wrap}
  .sbtn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:7px 11px;font-size:11.5px;font-weight:800;color:var(--dim);transition:.15s;white-space:nowrap}
  .sbtn svg{width:15px;height:15px;flex:0 0 auto}
  .sbtn:hover{color:var(--text);border-color:rgba(255,255,255,.22);transform:translateY(-1px)}
  .sbtn.yt:hover{border-color:rgba(255,0,0,.5)}
  .sbtn.ig:hover{border-color:rgba(225,48,108,.55)}
  .sbtn.tg:hover{border-color:rgba(42,171,238,.55)}
  .sbtn.th:hover{border-color:rgba(255,255,255,.45)}
  @media(max-width:900px){.sbtn span{display:none}.sbtn{padding:7px 9px}}
  .stage{position:relative;flex:1;min-height:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:pointer}
  .axis{position:absolute;top:14px;z-index:4;border:1px solid var(--line);background:rgba(9,13,26,.7);
    border-radius:11px;padding:8px 12px;cursor:pointer;transition:.15s;backdrop-filter:blur(6px)}
  .axis:hover{border-color:rgba(255,255,255,.22);transform:translateY(-1px)}
  .axis.l{left:18px}.axis.r{right:18px;text-align:right}
  .axis .k{font-size:10px;font-weight:800;letter-spacing:.14em;color:var(--faint)}
  .axis b{display:block;font-size:12.5px;margin-top:3px}
  .axis.l b{color:var(--gold)} .axis.r b{color:var(--on)}
  .axis .q{display:inline-block;margin-left:5px;font-size:10px;color:var(--faint)}
  .verdict{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);
    display:flex;align-items:center;gap:10px;max-width:80%;
    background:rgba(9,13,26,.85);border:1px solid var(--line);border-radius:13px;
    padding:11px 18px;backdrop-filter:blur(8px);z-index:3;text-align:center}
  .verdict .vt{font-weight:800;font-size:14px}
  .verdict .vd{font-size:12.5px;color:var(--dim)}
  @media(max-width:640px){.verdict{flex-direction:column;gap:3px;padding:10px 14px;max-width:92%}}
  .rankwrap{position:absolute;top:78px;right:16px;width:190px;display:flex;flex-direction:column;gap:6px;z-index:3;pointer-events:none}
  .rankttl{font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}
  .rk{display:grid;grid-template-columns:14px 1fr auto;align-items:center;gap:8px;
    background:rgba(11,17,30,.72);border:1px solid var(--line);border-radius:10px;padding:6px 10px}
  .rk .dot{width:8px;height:8px;border-radius:50%}
  .rk .nm{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rk .pc{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;font-family:var(--mono)}
  @media(max-width:1000px){.rankwrap{display:none}}
  .hint{position:absolute;left:18px;bottom:18px;font-size:11px;color:var(--faint);z-index:3;max-width:190px;line-height:1.55}
  @media(max-width:1100px){.hint{display:none}}
  .panel{position:absolute;top:14px;left:14px;bottom:14px;width:340px;max-width:calc(100% - 28px);
    background:linear-gradient(180deg,rgba(13,19,33,.985),rgba(9,13,24,.985));
    border:1px solid var(--line);border-radius:16px;padding:22px;z-index:8;
    transform:translateX(-115%);opacity:0;transition:transform .32s cubic-bezier(.2,.7,.2,1),opacity .25s;
    overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .panel.open{transform:none;opacity:1}
  .panel .px{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:9px;border:1px solid var(--line);
    background:rgba(255,255,255,.03);color:var(--dim);font-size:14px;cursor:pointer}
  .panel .px:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
  .ptag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;margin-bottom:12px}
  .panel h3{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:-.02em}
  .pnow{font-size:13px;font-weight:800;font-family:var(--mono);margin-bottom:18px}
  .psec{margin-bottom:16px}
  .pk{font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
  .psec p{margin:0;font-size:13.5px;line-height:1.62;color:#cdd4e2}
  .mlist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .mrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
    background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:9px;padding:7px 10px;cursor:pointer}
  .mrow:hover{border-color:rgba(255,255,255,.2)}
  .mrow .mn{font-size:12.5px;font-weight:700}
  .mrow .mv{font-size:12.5px;font-weight:800;font-family:var(--mono)}
  @media(max-width:640px){.panel{top:auto;left:0;right:0;bottom:0;width:100%;max-width:100%;border-radius:18px 18px 0 0;
    transform:translateY(110%);max-height:76%}.panel.open{transform:none}}
</style>

  ndx:{w:"기술·성장주의 심장. 돈이 풀리는지 조이는지(유동성)를 가장 크게 반영하는 지수예요.",r:"오르면 위험선호. S&P보다 더 빠지면 성장주에서 먼저 돈이 빠지는 신호로 봐요."},

    const r=await fetch(`/api/flow?tf=${encodeURIComponent(tf)}`);
    const d=await r.json();
    const v={};let ok=false;
    for(const id in SYM){const row=d[SYM[id]];
      if(row&&typeof row.pct==="number"&&!row.error){
        // 미국채는 '금리' 데이터라 방향을 뒤집음 (금리↑ = 채권값↓ = 자금 유출)
        v[id]= id==="bond" ? -row.pct*0.5 : row.pct; ok=true;}
      else v[id]=(DATA[tf]&&DATA[tf][id])||0;}
    if(ok){DATA[tf]=v;CACHE[tf]={t:Date.now(),v};setLive(true);}
  }catch(e){/* 실패 시 기존 값 유지 */}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=0,H=0;const DPR=Math.min(devicePixelRatio||1,2);
const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
const RISK_ANG=[70,35,0,-35,-70],SAFE_ANG=[145,215];
(function(){let ri=0,si=0;for(const a of ASSETS){a.ang=(a.group==="risk"?RISK_ANG[ri++]:SAFE_ANG[si++])*Math.PI/180;a.bend=(Math.random()-.5)*.24;}})();
/* 기간 버튼 생성 */
(function(){const seg=document.getElementById("seg");TFS.forEach(([k,label],i)=>{const b=document.createElement("button");b.dataset.k=k;b.textContent=label;b.setAttribute("aria-pressed",k==="1d");seg.appendChild(b);});})();
const stars=[];
function makeStars(){stars.length=0;const n=Math.round(W*H/6500);for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,tw:Math.random()*6.28,sp:.6+Math.random()});}
function resize(){const r=cv.getBoundingClientRect();W=Math.max(r.width,1);H=Math.max(r.height,1);cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);makeStars();}
addEventListener("resize",resize);
let period="1d",selected=null,selGroup=null;const parts=[];const cur={};ASSETS.forEach(a=>cur[a.id]=0);
/* 기간이 짧으면 값이 작아서 시각적으로 안 보이므로 표시 배율만 조정(숫자는 실제값 표기) */
const VIS={"1m":14,"15m":8,"30m":6,"1h":4,"4h":2.4,"6h":2.2,"12h":2,"1d":1.6,"1w":1,"1M":1};
function geom(){const m=Math.max(Math.min(W,H),160);return{cx:W*.5,cy:H*.53,R:m*.35,hub:m*.088};}
function nodePos(a){const g=geom();return{x:g.cx+Math.cos(a.ang)*g.R,y:g.cy-Math.sin(a.ang)*g.R};}
function ctrl(g,p,bend){const mx=(g.cx+p.x)/2,my=(g.cy+p.y)/2,dx=p.x-g.cx,dy=p.y-g.cy;return{x:mx-dy*bend,y:my+dx*bend};}
function qpt(a,b,c,t){const u=1-t;return{x:u*u*a.x+2*u*t*b.x+t*t*c.x,y:u*u*a.y+2*u*t*b.y+t*t*c.y};}
function mag(id){return Math.min(Math.abs(cur[id])*(VIS[period]||1),9);}
function spawn(){const g=geom();for(const a of ASSETS){const m=mag(a.id);if(m<.15)continue;if(Math.random()<m/16){const inflow=cur[a.id]>0,p=nodePos(a);parts.push({inflow,t:0,sp:.006+Math.random()*.005+m*.0006,A:{x:g.cx,y:g.cy},B:ctrl(g,p,a.bend),C:p,col:inflow?"47,230,168":"255,93,108",sz:1.2+Math.random()*1.6});}}if(parts.length>1200)parts.splice(0,parts.length-1200);}
function scoreOf(){const risk=ASSETS.filter(a=>a.group==="risk"),safe=ASSETS.filter(a=>a.group==="safe");
  const ra=risk.reduce((s,a)=>s+cur[a.id],0)/risk.length,sa=safe.reduce((s,a)=>s+cur[a.id],0)/safe.length;
  return (ra-sa)*(VIS[period]||1);}
function fmt(v){const d=Math.abs(v)<1?2:1;return (v>0?"+":"")+v.toFixed(d)+"%";}
function verdict(){const s=scoreOf(),inflow=[...ASSETS].sort((a,b)=>cur[b.id]-cur[a.id]),top=inflow[0],bot=inflow[inflow.length-1];let vt,vd,col;
  if(s>1.2){vt="위험선호 (Risk-On) 강함";col="var(--on)";vd=`돈이 위험자산으로 강하게 이동 — ${top.name} 유입 최고`;}
  else if(s>.3){vt="위험선호 우위";col="var(--on)";vd=`${top.name} 등 위험자산으로 자금 유입, ${bot.name} 약세`;}
  else if(s>-.3){vt="중립 · 관망";col="var(--gold)";vd="뚜렷한 쏠림 없음 — 방향 탐색 구간";}
  else if(s>-1.2){vt="위험회피 우위";col="var(--off)";vd=`안전자산(${ASSETS.filter(a=>a.group==='safe').sort((a,b)=>cur[b.id]-cur[a.id])[0].name})으로 자금 이동, ${bot.name} 약세`;}
  else{vt="위험회피 (Risk-Off) 강함";col="var(--off)";vd=`돈이 안전자산으로 도피 — ${bot.name} 이탈 심화`;}
  const e=document.getElementById("vt");e.textContent=vt;e.style.color=col;document.getElementById("vd").textContent=vd;}
function buildRank(){const wrap=document.getElementById("rank");wrap.querySelectorAll(".rk").forEach(e=>e.remove());
  [...ASSETS].sort((a,b)=>cur[b.id]-cur[a.id]).forEach(a=>{const f=cur[a.id],pos=f>=0,el=document.createElement("div");el.className="rk";
    el.innerHTML=`<span class="dot" style="background:${pos?'var(--on)':'var(--off)'}"></span><span class="nm">${a.name}</span><span class="pc" style="color:${pos?'var(--on)':'var(--off)'}">${fmt(f)}</span>`;
    wrap.appendChild(el);});}
let raf,tPrev=0,T=0;
function frame(t){const dt=Math.min((t-tPrev)||16,40);tPrev=t;T+=dt/1000;const tgt=DATA[period];for(const a of ASSETS)cur[a.id]+=(tgt[a.id]-cur[a.id])*.07;
  ctx.clearRect(0,0,W,H);
  for(const s of stars){s.tw+=.02*s.sp;const a=.2+Math.abs(Math.sin(s.tw))*.55;ctx.fillStyle=`rgba(200,215,255,${a*.55})`;ctx.beginPath();ctx.arc(s.x,s.y,rpos(s.r),0,7);ctx.fill();}
  const g=geom(),sc=scoreOf(),gcol=sc>.3?"47,230,168":sc<-.3?"255,93,108":"242,210,122";
  for(let i=1;i<=4;i++){ctx.strokeStyle=`rgba(255,255,255,${.05-i*.006})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(g.cx,g.cy,rpos(g.R*i/4),0,7);ctx.stroke();}
  ctx.globalCompositeOperation="lighter";
  const bgr=ctx.createLinearGradient(g.cx-g.R,0,g.cx+g.R,0);
  bgr.addColorStop(0,`rgba(242,210,122,${selGroup==="safe"?.14:.05})`);bgr.addColorStop(.5,"rgba(0,0,0,0)");bgr.addColorStop(1,`rgba(47,230,168,${selGroup==="risk"?.14:.05})`);
  ctx.fillStyle=bgr;ctx.beginPath();ctx.arc(g.cx,g.cy,rpos(g.R),0,7);ctx.fill();
  ctx.globalCompositeOperation="source-over";
  if(!reduce){const sweep=(T*.6)%(Math.PI*2);ctx.save();ctx.translate(g.cx,g.cy);ctx.rotate(sweep);const grad=ctx.createLinearGradient(0,0,g.R,0);grad.addColorStop(0,`rgba(${gcol},.15)`);grad.addColorStop(1,`rgba(${gcol},0)`);ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,rpos(g.R),-.27,.02);ctx.closePath();ctx.fill();ctx.restore();}
  for(const a of ASSETS){const p=nodePos(a),f=cur[a.id],col=f>=0?"47,230,168":"255,93,108",al=.05+Math.min(mag(a.id)/9,1)*.14,c=ctrl(g,p,a.bend);
    const hi=selected===a.id||selGroup===a.group;
    ctx.strokeStyle=`rgba(${col},${hi?al+.2:al})`;ctx.lineWidth=hi?2:1.2;ctx.beginPath();ctx.moveTo(g.cx,g.cy);ctx.quadraticCurveTo(c.x,c.y,p.x,p.y);ctx.stroke();}
  if(!reduce)spawn();
  ctx.globalCompositeOperation="lighter";
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.t+=p.sp*(dt/16);if(p.t>=1){parts.splice(i,1);continue;}const k=p.inflow?p.t:1-p.t,pt=qpt(p.A,p.B,p.C,k),fade=Math.sin(p.t*Math.PI);
    ctx.fillStyle=`rgba(${p.col},${fade*.95})`;ctx.beginPath();ctx.arc(pt.x,pt.y,rpos(p.sz),0,7);ctx.fill();
    ctx.fillStyle=`rgba(${p.col},${fade*.2})`;ctx.beginPath();ctx.arc(pt.x,pt.y,rpos(p.sz*3),0,7);ctx.fill();}
  ctx.globalCompositeOperation="source-over";
  ctx.textBaseline="middle";
  for(const a of ASSETS){const p=nodePos(a),f=cur[a.id],pos=f>=0,col=pos?"47,230,168":"255,93,108",m=mag(a.id),rad=8+m*2.2,
    pulse=1+Math.sin(T*2.2+a.ang*2)*.11*(m/9),sel=selected===a.id,ghi=selGroup===a.group;
    const rg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rpos(rad*3.3));rg.addColorStop(0,`rgba(${col},${.3+m*.05})`);rg.addColorStop(1,`rgba(${col},0)`);
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(p.x,p.y,rpos(rad*3.3*pulse),0,7);ctx.fill();
    if(!reduce&&m>1){const pr=((T*.5+a.ang)%1);ctx.strokeStyle=`rgba(${col},${(1-pr)*.4})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,rpos(rad+pr*22),0,7);ctx.stroke();}
    if(sel||ghi){const gc=a.group==="safe"?"242,210,122":"47,230,168";ctx.strokeStyle=sel?`rgb(${col})`:`rgba(${gc},.85)`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,rpos(rad+7),0,7);ctx.stroke();}
    ctx.fillStyle=`rgb(${col})`;ctx.beginPath();ctx.arc(p.x,p.y,rpos(rad),0,7);ctx.fill();
    ctx.fillStyle="rgba(5,6,12,.92)";ctx.beginPath();ctx.arc(p.x,p.y,rpos(rad*.4),0,7);ctx.fill();
    const cs=Math.cos(a.ang),side=cs>.2?1:cs<-.2?-1:0,lx=p.x+side*(rad+9),ly=p.y;ctx.textAlign=side>0?"left":side<0?"right":"center";
    ctx.shadowColor="rgba(0,0,0,.92)";ctx.shadowBlur=6;
    ctx.fillStyle="#eef2fa";ctx.font='700 13.5px "Pretendard Variable",Pretendard,sans-serif';ctx.fillText(a.name,lx,ly-8);
    ctx.fillStyle=`rgb(${col})`;ctx.font='800 13px ui-monospace,monospace';ctx.fillText(fmt(f),lx,ly+8);
    ctx.shadowBlur=0;}
  const gg=ctx.createRadialGradient(g.cx,g.cy,0,g.cx,g.cy,rpos(g.hub*1.9));gg.addColorStop(0,`rgba(${gcol},.4)`);gg.addColorStop(1,`rgba(${gcol},0)`);
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(g.cx,g.cy,rpos(g.hub*1.9),0,7);ctx.fill();
  if(!reduce){ctx.save();ctx.translate(g.cx,g.cy);ctx.rotate(T*.4);ctx.strokeStyle=`rgba(${gcol},.5)`;ctx.lineWidth=2;ctx.setLineDash([g.hub*.5,g.hub*.35]);ctx.beginPath();ctx.arc(0,0,rpos(g.hub*1.12),0,7);ctx.stroke();ctx.setLineDash([]);ctx.restore();}
  ctx.fillStyle="rgba(8,12,24,.96)";ctx.strokeStyle=`rgba(${gcol},.55)`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(g.cx,g.cy,rpos(g.hub),0,7);ctx.fill();ctx.stroke();
  const norm=clamp(sc/3,-1,1);ctx.lineWidth=4.5;ctx.lineCap="round";
  ctx.strokeStyle="rgba(255,255,255,.09)";ctx.beginPath();ctx.arc(g.cx,g.cy,rpos(g.hub*.78),Math.PI*1.2,Math.PI*1.8);ctx.stroke();
  ctx.strokeStyle=`rgb(${gcol})`;ctx.shadowColor=`rgb(${gcol})`;ctx.shadowBlur=12;const mid=Math.PI*1.5,end=mid+norm*Math.PI*.3;
  ctx.beginPath();ctx.arc(g.cx,g.cy,rpos(g.hub*.78),Math.min(mid,end),Math.max(mid,end));ctx.stroke();ctx.shadowBlur=0;
  ctx.textAlign="center";
  ctx.fillStyle="#8b93a9";ctx.font='800 10.5px "Pretendard Variable",Pretendard,sans-serif';ctx.fillText("유동성",g.cx,g.cy-g.hub*.42);
  ctx.fillStyle=`rgb(${gcol})`;ctx.font="800 "+Math.round(g.hub*.52)+'px "Pretendard Variable",Pretendard,sans-serif';ctx.fillText((sc>0?"+":"")+sc.toFixed(1),g.cx,g.cy+2);
  const kl=sc>.3?"위험선호":sc<-.3?"위험회피":"중립";
  ctx.fillStyle=`rgb(${gcol})`;ctx.font='800 11.5px "Pretendard Variable",Pretendard,sans-serif';ctx.fillText(kl,g.cx,g.cy+g.hub*.46);
  raf=requestAnimationFrame(frame);}
/* 패널 */
const $=id=>document.getElementById(id);
function openAsset(a){selected=a.id;selGroup=null;
  const f=cur[a.id],pos=f>=0,col=pos?"var(--on)":"var(--off)",gc=a.group==="risk"?"47,230,168":"242,210,122";
  const tag=$("ptag");tag.textContent=a.group==="risk"?"위험자산":"안전자산";tag.style.color=`rgb(${gc})`;tag.style.background=`rgba(${gc},.13)`;
  $("pname").textContent=a.name;
  $("pnow").innerHTML=`이 기간 자금 흐름 <span style="color:${col}">${fmt(f)}</span> · ${pos?"유입":"유출"}`;
  $("pk1").textContent="왜 중요한가";$("pk2").textContent="어떻게 보나";
  $("pwhy").textContent=DETAIL[a.id].w;$("pread").textContent=DETAIL[a.id].r;
  $("pmembers").style.display="none";
  $("panel").classList.add("open");}
function openGroup(key){selGroup=key;selected=null;
  const G=GROUP_INFO[key],mem=ASSETS.filter(a=>a.group===key),avg=mem.reduce((s,a)=>s+cur[a.id],0)/mem.length,pos=avg>=0;
  const tag=$("ptag");tag.textContent="그룹";tag.style.color=`rgb(${G.color})`;tag.style.background=`rgba(${G.color},.13)`;
  $("pname").textContent=G.name;
  $("pnow").innerHTML=`그룹 평균 <span style="color:${pos?'var(--on)':'var(--off)'}">${fmt(avg)}</span> · ${pos?"유입":"유출"}`;
  $("pk1").textContent="어떤 자산인가";$("pk2").textContent="어떻게 보나";
  $("pwhy").textContent=G.w;$("pread").textContent=G.r;
  const ml=$("mlist");ml.innerHTML="";
  mem.sort((a,b)=>cur[b.id]-cur[a.id]).forEach(a=>{const f=cur[a.id],p=f>=0,row=document.createElement("div");row.className="mrow";
    row.innerHTML=`<span class="mn">${a.name}</span><span class="mv" style="color:${p?'var(--on)':'var(--off)'}">${fmt(f)}</span>`;
    row.addEventListener("click",()=>openAsset(a));ml.appendChild(row);});
  $("pmembers").style.display="";
  $("panel").classList.add("open");}
function closePanel(){selected=null;selGroup=null;$("panel").classList.remove("open");}
$("px").addEventListener("click",closePanel);
$("axSafe").addEventListener("click",()=>openGroup("safe"));
$("axRisk").addEventListener("click",()=>openGroup("risk"));
cv.addEventListener("click",e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const g=geom();
  if(Math.hypot(g.cx-mx,g.cy-my)<g.hub*1.2){ // 중앙 허브 → 현재 우세 그룹 설명
    openGroup(scoreOf()>=0?"risk":"safe");return;}
  let best=null,bd=1e9;for(const a of ASSETS){const p=nodePos(a),d=Math.hypot(p.x-mx,p.y-my);if(d<bd){bd=d;best=a;}}
  if(best&&bd<34)openAsset(best);else closePanel();});
function refresh(){verdict();buildRank();
  if(selected){const a=ASSETS.find(x=>x.id===selected);if(a)openAsset(a);}
  else if(selGroup)openGroup(selGroup);}
$("seg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;period=b.dataset.k;
  document.querySelectorAll("#seg button").forEach(x=>x.setAttribute("aria-pressed",x===b));
  refresh();loadFlow(period).then(refresh);});
ASSETS.forEach(a=>cur[a.id]=DATA[period][a.id]);resize();refresh();
loadFlow(period).then(refresh);
setInterval(()=>loadFlow(period).then(refresh),60e3);
if(reduce){tPrev=performance.now();frame(performance.now());cancelAnimationFrame(raf);}else{raf=requestAnimationFrame(frame);}
setInterval(refresh,700);
</script>
